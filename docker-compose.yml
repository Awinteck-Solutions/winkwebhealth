name: winkwebhealth

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - wink
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api-mongoose
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    # No host port publish — Apache proxies to the container bridge IP directly.
    # docker-proxy on 127.0.0.1:3000 is unreliable on cPanel VPS (connection reset).
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    networks:
      wink:
        ipv4_address: 172.28.10.10
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - wink
    # Run exactly one worker — do not scale this service.

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - wink

volumes:
  redis_data:
  api_uploads:

networks:
  wink:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.10.0/24

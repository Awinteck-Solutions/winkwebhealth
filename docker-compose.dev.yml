# Local development: expose Redis to the host for `npm run dev` (api/worker/web outside Docker).
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up redis -d
# Uses 6380 on the host if another Redis already owns 6379 (e.g. monitoringtools-redis-1).

services:
  redis:
    ports:
      - "127.0.0.1:6380:6379"

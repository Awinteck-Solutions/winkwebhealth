# Apache reverse-proxy examples for cPanel / WHM hybrid deploy
#
# Apache terminates SSL (AutoSSL). Docker serves app on localhost only:
#   web  -> 127.0.0.1:8080
#   api  -> 127.0.0.1:3001  (host port; container listens on 3000)
#
# Add via WHM: Apache Configuration -> Include Editor -> Pre VirtualHost Include
# or per-domain "Additional Apache directives" in cPanel.

# --- Main site: winkwebhealth.com -> web container ---
<VirtualHost *:443>
    ServerName winkwebhealth.com
    ServerAlias www.winkwebhealth.com

    SSLEngine on
    # SSLCertificateFile / SSLCertificateKeyFile managed by AutoSSL

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    ErrorLog logs/winkwebhealth-web-error.log
    CustomLog logs/winkwebhealth-web-access.log combined
</VirtualHost>

# --- API: api.winkwebhealth.com -> api container ---
<VirtualHost *:443>
    ServerName api.winkwebhealth.com

    SSLEngine on

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog logs/winkwebhealth-api-error.log
    CustomLog logs/winkwebhealth-api-access.log combined
</VirtualHost>

# HTTP -> HTTPS redirect (if not handled by cPanel force-HTTPS)
# RewriteEngine On
# RewriteCond %{HTTPS} off
# RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
